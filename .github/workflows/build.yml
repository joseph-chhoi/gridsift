name: Build GridSift

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller pydicom PyQt6 llama-cpp-python pillow
      - name: Build
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "GridSift" app.py
      - name: Zip
        run: |
          Compress-Archive -Path dist\GridSift -DestinationPath GridSift-Windows.zip
      - uses: actions/upload-artifact@v4
        with:
          name: GridSift-Windows
          path: GridSift-Windows.zip

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller pydicom PyQt6 llama-cpp-python pillow
      - name: Build
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "GridSift" app.py
      - name: Zip
        run: |
          zip -r GridSift-Mac.zip dist/GridSift
      - uses: actions/upload-artifact@v4
        with:
          name: GridSift-Mac
          path: GridSift-Mac.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pyinstaller pydicom PyQt6 llama-cpp-python pillow
          sudo apt-get install -y libxcb-xinerama0 libxcb1 libx11-6
      - name: Build
        run: |
          python -m PyInstaller --noconfirm --onedir --windowed --name "GridSift" app.py
      - name: Zip
        run: |
          zip -r GridSift-Linux.zip dist/GridSift
      - uses: actions/upload-artifact@v4
        with:
          name: GridSift-Linux
          path: GridSift-Linux.zip

  release:
    needs: [build-windows, build-mac, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            GridSift-Windows/GridSift-Windows.zip
            GridSift-Mac/GridSift-Mac.zip
            GridSift-Linux/GridSift-Linux.zip